name: Quality

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
      - name: Vet
        run: go vet ./...
      - name: Tests
        run: go test -race -cover -coverprofile=coverage.out ./...
      - name: Coverage threshold
        run: |
          PCT=$(go tool cover -func=coverage.out | tail -n 1 | awk '{print $3}' | tr -d '%')
          echo "coverage: $PCT%"
          if awk "BEGIN{exit !($PCT < 70)}"; then
            echo "coverage below 70%"
            exit 1
          fi

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.62.0
