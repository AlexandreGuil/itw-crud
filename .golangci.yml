run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - dupl
    - errorlint
    - gocritic
    - goimports
    - gosec
    - misspell
    - noctx
    - prealloc
    - revive
    - unconvert
    - unparam
    - whitespace
  settings:
    revive:
      rules:
        - name: unused-parameter
          disabled: false

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - dupl
        - gosec
