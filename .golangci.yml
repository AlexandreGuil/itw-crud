version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - dupl
    - errorlint
    - gocritic
    - gosec
    - misspell
    - noctx
    - prealloc
    - revive
    - unconvert
    - unparam
    - whitespace
  settings:
    revive:
      rules:
        - name: unused-parameter
          disabled: false
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - dupl
          - gosec

formatters:
  enable:
    - goimports
